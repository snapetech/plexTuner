# Oracle-cap tuner instances (hdhrcap100..hdhrcap600) are run by the main supervisor pod.
# There is no separate oracle deployment. This file defines only the Service that routes
# iptvtunerr-oracle-hdhr.plex.svc:5201–5206 to the iptvtunerr-supervisor pod.
#
# To add oracle instances to a generated supervisor config, append the instances from
# k8s/oracle-instances.json to the main config's instances array.
#
apiVersion: v1
kind: Service
metadata:
  name: iptvtunerr-oracle-hdhr
  namespace: plex
spec:
  selector:
    app: iptvtunerr-supervisor
  ports:
    - { name: p5201, port: 5201, targetPort: 5201, protocol: TCP }
    - { name: p5202, port: 5202, targetPort: 5202, protocol: TCP }
    - { name: p5203, port: 5203, targetPort: 5203, protocol: TCP }
    - { name: p5204, port: 5204, targetPort: 5204, protocol: TCP }
    - { name: p5205, port: 5205, targetPort: 5205, protocol: TCP }
    - { name: p5206, port: 5206, targetPort: 5206, protocol: TCP }
