# Authoritative verification commands (machine-readable).
# CI runs scripts/verify, which runs scripts/verify-steps.sh.
# Keep this file in sync with scripts/verify-steps.sh for agent reference.

bootstrap: "N/A"
format: "gofmt -s -l .  # fail if any file needs formatting; fix with: gofmt -s -w ."
lint: "go vet ./..."
typecheck: "N/A  # Go is compiled"
test: "go test -count=1 ./..."
integration_test: "go test -count=1 ./internal/tuner -run 'Test(XMLTV_serve|XMLTV_serveCachedGuideReady|HDHR_discover|HDHR_lineup|HDHR_lineup_status|Server_UpdateChannelsTriggersXMLTVRefresh)'  # startup/registration contract smoke"
build: "go build -o /dev/null ./cmd/iptv-tunerr"
smoke: "bash ./scripts/ci-smoke.sh  # build synthetic catalog binary smoke: startup contract, vod-webdav mount hints, and WebDAV PROPFIND surface"
run: "go run ./cmd/iptv-tunerr run  # needs .env; or: serve / index / mount / probe"
run_single_test: "go test -v -run <TestName> ./internal/<pkg>"
clean: "go clean -cache  # optional; rm -f iptv-tunerr if built to repo root"

# Verification order (scripts/verify-steps.sh)
verify_steps:
  - format
  - vet
  - script_syntax  # bash -n scripts/*.sh; python3 -m py_compile scripts/*.py
  - test
  - build
  - smoke

# Short / QA helpers
quick_verify: "scripts/verify  # same as CI; ~10–30s"
release_smoke: "go test -count=1 ./internal/tuner -run 'Test(XMLTV_serve|XMLTV_serveCachedGuideReady|HDHR_discover|HDHR_lineup|HDHR_lineup_status|Server_UpdateChannelsTriggersXMLTVRefresh|Gateway_stream_providerAccountLimitRejectsLocally|Gateway_stream_successReleasesProviderAccountLease|ProviderBehaviorProfile_includesAccountPoolState)' && go test -count=1 ./internal/vodwebdav ./cmd/iptv-tunerr && ./scripts/verify"
probe_provider: "go run ./cmd/iptv-tunerr probe  # -urls=... optional; needs .env creds"
check_endpoints: "curl -s -o /dev/null -w '%{http_code}' <BASE_URL>/discover.json  # 200 = OK"
local_test: "scripts/iptvtunerr-local-test.sh  # [qa|serve|run|smoke|all] no cluster; see docs/how-to/run-without-kubernetes.md"
stream_compare_harness: "DIRECT_URL=<upstream.m3u8> TUNERR_URL=<base/stream/id> ./scripts/stream-compare-harness.sh  # ffplay/ffprobe/curl + optional tcpdump + parsed manifest.json artifacts for HLS/DASH"
channel_diff_harness: "TUNERR_BASE_URL=http://127.0.0.1:5004 GOOD_CHANNEL_ID=123 BAD_CHANNEL_ID=456 ./scripts/channel-diff-harness.sh  # infer direct upstreams from Tunerr attempts, run paired stream-compare captures, and classify good-vs-bad channel differences"
multi_stream_harness: "TUNERR_BASE_URL=http://127.0.0.1:5004 CHANNEL_IDS=123,456 ./scripts/multi-stream-harness.sh  # staggered parallel live pulls + provider/runtime/attempt snapshots + summary for 'second stream kills the first'"
live_race_harness: "RUN_SECONDS=30 CONCURRENCY=6 ./scripts/live-race-harness.sh  # synthetic/replay + concurrent probes + optional PMS/tcpdump/Plex Web probe; .diag/live-race/<id>/"
harness_index: "python3 scripts/harness-index.py  # list newest .diag/live-race|stream-compare|multi-stream runs; add --json"
evidence_intake: "./scripts/evidence-intake.sh -id <case-id> -print  # scaffold .diag/evidence/<case-id>/ for debug-bundle + PMS logs + Tunerr logs + pcap"
build_test_packages: "./scripts/build-test-packages.sh  # cross-platform tester archives + checksums"
build_tester_release: "./scripts/build-tester-release.sh  # staged tester handoff bundle (packages/examples/docs/manifest)"
plex_hidden_grab_recover: "./scripts/plex-hidden-grab-recover.sh --dry-run  # detect Plex hidden active-grab wedge; add --restart when safe"
catchup_daemon: "go run ./cmd/iptv-tunerr catchup-daemon -catalog ./catalog.json -xmltv ./guide.xml -out-dir ./recordings -publish-dir ./published -stream-base-url http://127.0.0.1:5004 -once  # policy-driven recorder daemon MVP with optional published layout"
