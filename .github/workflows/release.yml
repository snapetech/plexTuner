name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify
        run: ./scripts/verify

      - name: Release smoke
        run: go test -count=1 ./internal/tuner -run 'Test(XMLTV_serve|XMLTV_serveCachedGuideReady|HDHR_discover|HDHR_lineup|HDHR_lineup_status|Server_UpdateChannelsTriggersXMLTVRefresh)'

      - name: Build binaries
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-X main.Version=${VERSION}"
          mkdir -p dist

          build() {
            local os=$1 arch=$2 arm=${3:-}
            local suffix="$arch"
            if [ "$arch" = "arm" ] && [ -n "$arm" ]; then
              suffix="armv${arm}"
            fi
            local name="iptv-tunerr-${VERSION}-${os}-${suffix}"
            local out="dist/${name}"
            echo "Building ${name}..."
            CGO_ENABLED=0 GOOS=${os} GOARCH=${arch} GOARM=${arm} \
              go build -mod=vendor -ldflags="${LDFLAGS}" \
              -o "${out}" ./cmd/iptv-tunerr
            if [ "${os}" = "windows" ]; then
              mv "${out}" "${out}.exe"
              zip -j "dist/${name}.zip" "${out}.exe"
            else
              tar -czf "dist/${name}.tar.gz" -C dist "${name}"
            fi
            rm -f "${out}" "${out}.exe"
          }

          build linux  amd64
          build linux  arm64
          build linux  arm 7
          build darwin amd64
          build darwin arm64
          build windows amd64
          build windows arm64

          cd dist
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate release notes
        run: |
          set -euo pipefail
          chmod +x ./scripts/generate-release-notes.sh
          ./scripts/generate-release-notes.sh "${GITHUB_REF_NAME}" dist/release-notes.md
          cat dist/release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
