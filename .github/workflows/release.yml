name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify
        run: ./scripts/verify

      - name: Release smoke
        run: go test -count=1 ./internal/tuner -run 'Test(XMLTV_serve|XMLTV_serveCachedGuideReady|HDHR_discover|HDHR_lineup|HDHR_lineup_status|Server_UpdateChannelsTriggersXMLTVRefresh)'

      - name: Build binaries
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-X main.Version=${VERSION}"
          mkdir -p dist

          build() {
            local os=$1 arch=$2 arm=${3:-}
            local suffix="$arch"
            if [ "$arch" = "arm" ] && [ -n "$arm" ]; then
              suffix="armv${arm}"
            fi
            local name="iptv-tunerr-${VERSION}-${os}-${suffix}"
            local out="dist/${name}"
            echo "Building ${name}..."
            CGO_ENABLED=0 GOOS=${os} GOARCH=${arch} GOARM=${arm} \
              go build -mod=vendor -ldflags="${LDFLAGS}" \
              -o "${out}" ./cmd/iptv-tunerr
            if [ "${os}" = "windows" ]; then
              mv "${out}" "${out}.exe"
              zip -j "dist/${name}.zip" "${out}.exe"
            else
              tar -czf "dist/${name}.tar.gz" -C dist "${name}"
            fi
            rm -f "${out}" "${out}.exe"
          }

          build linux  amd64
          build linux  arm64
          build linux  arm 7
          build darwin amd64
          build darwin arm64
          build windows amd64
          build windows arm64

          cd dist
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate release notes
        run: |
          set -euo pipefail
          chmod +x ./scripts/generate-release-notes.sh
          ./scripts/generate-release-notes.sh "${GITHUB_REF_NAME}" dist/release-notes.md
          cat dist/release-notes.md

      - uses: softprops/action-gh-release@v3
        with:
          body_path: dist/release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt

  announce-discord:
    name: Announce Release to Discord
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Post Discord announcement
        env:
          DISCORD_RELEASE_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "$DISCORD_RELEASE_WEBHOOK" ]; then
            echo "DISCORD_RELEASE_WEBHOOK is not configured; skipping Discord announcement."
            exit 0
          fi

          payload=$(cat <<EOF
          {
            "content": "📡 **Tunerr release published**\nVersion: \`${VERSION}\`\nRelease: ${RELEASE_URL}"
          }
          EOF
          )

          if ! curl --fail --silent --show-error \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_RELEASE_WEBHOOK"; then
            echo "Discord release announcement failed; continuing without failing the release workflow."
          fi

      - name: Post Matrix announcement
        env:
          MATRIX_RELEASE_ACCESS_TOKEN: ${{ secrets.TIMEWAYS_MATRIX_RELEASE_TOKEN }}
          MATRIX_BASE_URL: https://matrix.timeways.net
          MATRIX_ROOM_ID: '!feVqoCPCPPaCQmTCEE:timeways.net'
          MATRIX_PROJECT_KEY: iptvtunerr
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "$MATRIX_RELEASE_ACCESS_TOKEN" ]; then
            echo "TIMEWAYS_MATRIX_RELEASE_TOKEN is not configured; skipping Matrix announcement."
            exit 0
          fi

          today_utc="$(date -u +%F)"
          marker="releasebot-project:${MATRIX_PROJECT_KEY}"
          sync_filter="$(jq -cn --arg room "$MATRIX_ROOM_ID" '{"room":{"rooms":[ $room ],"timeline":{"limit":50}}}')"
          sync_filter_encoded="$(SYNC_FILTER="$sync_filter" python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["SYNC_FILTER"], safe=""))')"

          previous_event_id="$(
            curl --fail --silent --show-error \
              -H "Authorization: Bearer ${MATRIX_RELEASE_ACCESS_TOKEN}" \
              "${MATRIX_BASE_URL}/_matrix/client/r0/sync?timeout=0&filter=${sync_filter_encoded}" |
              jq -r \
                --arg room "$MATRIX_ROOM_ID" \
                --arg marker "$marker" \
                --arg today "$today_utc" \
                '
                  [.rooms.join[$room].timeline.events[]?
                    | select(.sender == "@releasebot:timeways.net")
                    | select(.type == "m.room.message")
                    | select((.content.formatted_body // "") | contains($marker))
                    | select((.origin_server_ts / 1000 | strftime("%F")) == $today)
                  ]
                  | sort_by(.origin_server_ts)
                  | last
                  | .event_id // empty
                '
          )"

          if [ -n "$previous_event_id" ]; then
            redact_txn="redact-${MATRIX_PROJECT_KEY}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            if ! curl --fail --silent --show-error \
              -X POST \
              -H "Authorization: Bearer ${MATRIX_RELEASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"reason":"Superseded by newer release announcement"}' \
              "${MATRIX_BASE_URL}/_matrix/client/r0/rooms/%21feVqoCPCPPaCQmTCEE%3Atimeways.net/redact/${previous_event_id}/${redact_txn}"; then
              echo "Matrix release-announcement redact failed; continuing without failing the release workflow."
            fi
          fi

          payload="$(jq -cn \
            --arg body "📡 Tunerr release published\nVersion: ${VERSION}\nRelease: ${RELEASE_URL}" \
            --arg html "<p>📡 Tunerr release published<br>Version: <code>${VERSION}</code><br>Release: <a href=\"${RELEASE_URL}\">${RELEASE_URL}</a></p><!-- ${marker} -->" \
            '{
              msgtype: "m.text",
              body: $body,
              format: "org.matrix.custom.html",
              formatted_body: $html
            }'
          )"

          txn_id="${MATRIX_PROJECT_KEY}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          if ! curl --fail --silent --show-error \
            -X PUT \
            -H "Authorization: Bearer ${MATRIX_RELEASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "${MATRIX_BASE_URL}/_matrix/client/r0/rooms/%21feVqoCPCPPaCQmTCEE%3Atimeways.net/send/m.room.message/${txn_id}"; then
            echo "Matrix release announcement failed; continuing without failing the release workflow."
          fi
