name: Publish PPA

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.63"
        required: true

permissions:
  contents: read

jobs:
  publish-ppa:
    runs-on: [self-hosted, Linux, X64, iptvtunerr-deploy]
    steps:
      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.tag }}
          fetch-depth: 0

      - name: Require release tag on main
        env:
          RELEASE_TAG_MAIN_MODE: ancestor
        run: ./scripts/ensure-release-tag-on-main.sh "${{ steps.version.outputs.tag }}"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install packaging tools
        run: |
          set -euo pipefail
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y dpkg-dev gnupg curl
          elif command -v pacman >/dev/null 2>&1; then
            sudo pacman -Sy --needed --noconfirm dpkg gnupg curl
          elif command -v dnf >/dev/null 2>&1; then
            sudo dnf install -y dpkg-dev gnupg2 curl
          elif command -v yum >/dev/null 2>&1; then
            sudo yum install -y dpkg-dev gnupg2 curl
          elif command -v apk >/dev/null 2>&1; then
            sudo apk add --no-cache dpkg gnupg curl
          else
            echo "No supported package manager found for PPA packaging tools" >&2
            exit 1
          fi

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "$GPG_PRIVATE_KEY"
          printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Prepare source package
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          src="iptvtunerr-${version}"
          rm -rf "$src"
          mkdir -p "$src/usr/bin" "$src/lib/systemd/system" "$src/etc/iptvtunerr" "$src/usr/lib/sysusers.d" "$src/usr/lib/tmpfiles.d"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -mod=vendor -trimpath -ldflags="-s -w -X main.Version=v${version}" -o "$src/usr/bin/iptv-tunerr" ./cmd/iptv-tunerr
          cp packaging/aur/iptvtunerr.service "$src/lib/systemd/system/"
          cp packaging/aur/iptvtunerr.env "$src/etc/iptvtunerr/"
          cp packaging/aur/iptvtunerr.sysusers "$src/usr/lib/sysusers.d/iptvtunerr.conf"
          cp packaging/aur/iptvtunerr.tmpfiles "$src/usr/lib/tmpfiles.d/iptvtunerr.conf"
          cp -r packaging/debian "$src/debian"
          ppa_rev="$(date -u +%Y%m%d%H%M)"
          cat > "$src/debian/changelog" <<EOF
          iptvtunerr (${version}+ppa${ppa_rev}~jammy) jammy; urgency=medium

            * Release ${{ steps.version.outputs.tag }}

           -- snapetech <iptvtunerr@proton.me>  $(date -R)
          EOF
          chmod +x "$src/debian/rules" "$src/debian/postinst"

      - name: Build signed source package
        run: |
          set -euo pipefail
          cd "iptvtunerr-${{ steps.version.outputs.version }}"
          dpkg-source -b .
          dpkg-genchanges -S -sa -O../iptvtunerr_${{ steps.version.outputs.version }}_source.changes
          cd ..
          for signed in *.dsc *.changes; do
            gpg --batch --yes --local-user 07E2531E1F470F8008ACCFC996A07606FE65392F \
              --clearsign --digest-algo SHA512 --output "${signed}.asc" "$signed"
            mv "${signed}.asc" "$signed"
          done

      - name: Upload to Launchpad PPA
        run: |
          set -euo pipefail
          incoming="ftp://ppa.launchpad.net/~keefshape/ubuntu/iptvtunerr/"
          changes="$(find . -maxdepth 1 -name '*.changes' -print -quit)"
          test -n "$changes"
          awk '/^Files:/{files=1; next} files && NF >= 5 {print $5}' "$changes" | while read -r file; do
            test -f "$file"
            curl --fail --show-error --ftp-create-dirs --user anonymous: \
              --upload-file "$file" "${incoming}${file}"
          done
          curl --fail --show-error --ftp-create-dirs --user anonymous: \
            --upload-file "$changes" "${incoming}$(basename "$changes")"
