name: Deploy Cluster

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to deploy"
        required: false
        default: main

concurrency:
  group: iptvtunerr-cluster-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, iptvtunerr-deploy]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Resolve version
        id: version
        run: |
          HEAD_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="${HEAD_SHA:0:7}"
          echo "sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "short=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=dev-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Deploy cluster
        env:
          TARGET_SHA: ${{ steps.version.outputs.sha }}
          TARGET_SHORT_SHA: ${{ steps.version.outputs.short }}
          TARGET_VERSION: ${{ steps.version.outputs.version }}
        run: bash ./scripts/deploy-cluster.sh
