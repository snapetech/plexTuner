name: Publish COPR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.63"
        required: true

permissions:
  contents: read

jobs:
  publish-copr:
    runs-on: [self-hosted, Linux, X64, iptvtunerr]
    steps:
      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.tag }}
          fetch-depth: 0

      - name: Require release tag on main
        env:
          RELEASE_TAG_MAIN_MODE: ancestor
        run: ./scripts/ensure-release-tag-on-main.sh "${{ steps.version.outputs.tag }}"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release source
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          asset="iptv-tunerr-v${version}-linux-amd64"
          mkdir -p "${asset}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -mod=vendor -trimpath -ldflags="-s -w -X main.Version=v${version}" -o "${asset}/iptv-tunerr" ./cmd/iptv-tunerr
          tar -czf "${asset}.tar.gz" "${asset}"

      - name: Install RPM/COPR tooling
        run: |
          set -euo pipefail
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates krb5-user oathtool rpm python3-pip python3-venv
          elif command -v pacman >/dev/null 2>&1; then
            sudo pacman -Sy --needed --noconfirm oath-toolkit krb5 rpm-tools python-pip python-virtualenv
          elif command -v dnf >/dev/null 2>&1; then
            sudo dnf install -y oath-toolkit krb5-workstation rpm-build python3-pip
          elif command -v yum >/dev/null 2>&1; then
            sudo yum install -y oath-toolkit krb5-workstation rpm-build python3-pip
          elif command -v apk >/dev/null 2>&1; then
            sudo apk add --no-cache oath-toolkit-oathtool krb5 rpm python3 py3-pip
          else
            echo "No supported package manager found for COPR tooling" >&2
            exit 1
          fi
          venv="${RUNNER_TEMP:-/tmp}/iptvtunerr-copr-cli"
          python3 -m venv "$venv"
          "$venv/bin/python" -m pip install --upgrade pip
          "$venv/bin/python" -m pip install copr-cli rich
          echo "$venv/bin" >> "$GITHUB_PATH"

      - name: Configure COPR
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
          COPR_KERBEROS_PRINCIPAL: ${{ secrets.COPR_KERBEROS_PRINCIPAL }}
          COPR_KERBEROS_KEYTAB_B64: ${{ secrets.COPR_KERBEROS_KEYTAB_B64 }}
          COPR_FEDORA_USERNAME: ${{ secrets.COPR_FEDORA_USERNAME }}
          COPR_FEDORA_PASSWORD: ${{ secrets.COPR_FEDORA_PASSWORD }}
          COPR_FEDORA_OTP_SECRET: ${{ secrets.COPR_FEDORA_OTP_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p ~/.config

          if [[ -n "${COPR_KERBEROS_PRINCIPAL:-}" && -n "${COPR_KERBEROS_KEYTAB_B64:-}" ]]; then
            sudo install -d -m 0755 /etc/ipa
            curl -fsSL https://id.fedoraproject.org/ipa/config/ca.crt | sudo tee /etc/ipa/ca.crt >/dev/null
            sudo install -d -m 0755 /etc/krb5.conf.d
            sudo tee /etc/krb5.conf.d/fedoraproject_org >/dev/null <<'EOF'
          [realms]
           FEDORAPROJECT.ORG = {
            kdc = https://id.fedoraproject.org/KdcProxy
            pkinit_anchors = FILE:/etc/ipa/ca.crt
           }

          [domain_realm]
           .fedoraproject.org = FEDORAPROJECT.ORG
           fedoraproject.org = FEDORAPROJECT.ORG
          EOF
            sudo sed -i '/^\[libdefaults\]/a\  dns_lookup_realm = false\n  rdns = false\n  dns_canonicalize_hostname = false' /etc/krb5.conf

            keytab="$RUNNER_TEMP/copr.keytab"
            ccache="$RUNNER_TEMP/copr.krb5cc"
            printf '%s' "$COPR_KERBEROS_KEYTAB_B64" | base64 -d > "$keytab"
            chmod 0600 "$keytab"
            KRB5CCNAME="FILE:$ccache" kinit -kt "$keytab" "$COPR_KERBEROS_PRINCIPAL"
            rm -f "$keytab"
            echo "KRB5CCNAME=FILE:$ccache" >> "$GITHUB_ENV"
            cat > ~/.config/copr <<EOF
          [copr-cli]
          username = slskdn
          copr_url = https://copr.fedorainfracloud.org
          gssapi = true
          EOF
          elif [[ -n "${COPR_FEDORA_USERNAME:-}" && -n "${COPR_FEDORA_PASSWORD:-}" && -n "${COPR_FEDORA_OTP_SECRET:-}" ]]; then
            sudo install -d -m 0755 /etc/ipa
            curl -fsSL https://id.fedoraproject.org/ipa/config/ca.crt | sudo tee /etc/ipa/ca.crt >/dev/null
            sudo install -d -m 0755 /etc/krb5.conf.d
            sudo tee /etc/krb5.conf.d/fedoraproject_org >/dev/null <<'EOF'
          [realms]
           FEDORAPROJECT.ORG = {
            kdc = https://id.fedoraproject.org/KdcProxy
            pkinit_anchors = FILE:/etc/ipa/ca.crt
           }

          [domain_realm]
           .fedoraproject.org = FEDORAPROJECT.ORG
           fedoraproject.org = FEDORAPROJECT.ORG
          EOF
            sudo sed -i '/^\[libdefaults\]/a\  dns_lookup_realm = false\n  rdns = false\n  dns_canonicalize_hostname = false' /etc/krb5.conf
            ccache="$RUNNER_TEMP/copr.krb5cc"
            armor="$RUNNER_TEMP/copr.krb5cc.armor"
            otp="$(oathtool --totp --base32 "$COPR_FEDORA_OTP_SECRET")"
            KRB5CCNAME="FILE:$armor" kinit -n @FEDORAPROJECT.ORG
            printf '%s%s\n' "$COPR_FEDORA_PASSWORD" "$otp" \
              | KRB5CCNAME="FILE:$ccache" kinit -T "FILE:$armor" "${COPR_FEDORA_USERNAME}@FEDORAPROJECT.ORG"
            KRB5CCNAME="FILE:$armor" kdestroy || true
            echo "KRB5CCNAME=FILE:$ccache" >> "$GITHUB_ENV"
            cat > ~/.config/copr <<EOF
          [copr-cli]
          username = slskdn
          copr_url = https://copr.fedorainfracloud.org
          gssapi = true
          EOF
          elif [[ -n "${COPR_LOGIN:-}" && -n "${COPR_TOKEN:-}" ]]; then
            cat > ~/.config/copr <<EOF
          [copr-cli]
          login = ${COPR_LOGIN}
          username = slskdn
          token = ${COPR_TOKEN}
          copr_url = https://copr.fedorainfracloud.org
          EOF
          else
            echo "COPR credentials not configured." >&2
            exit 1
          fi

      - name: Build SRPM
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,SRPMS}
          cp "iptv-tunerr-v${version}-linux-amd64.tar.gz" ~/rpmbuild/SOURCES/
          cp packaging/aur/iptvtunerr.service ~/rpmbuild/SOURCES/
          cp packaging/aur/iptvtunerr.env ~/rpmbuild/SOURCES/
          cp packaging/aur/iptvtunerr.sysusers ~/rpmbuild/SOURCES/iptvtunerr.conf
          cp packaging/aur/iptvtunerr.tmpfiles ~/rpmbuild/SOURCES/
          cp packaging/rpm/iptvtunerr.spec ~/rpmbuild/SPECS/
          sed -i "s/^Version:.*/Version:        ${version}/" ~/rpmbuild/SPECS/iptvtunerr.spec
          sed -i "s|^Source0:.*|Source0:        iptv-tunerr-v${version}-linux-amd64.tar.gz|" ~/rpmbuild/SPECS/iptvtunerr.spec
          rpmbuild -bs ~/rpmbuild/SPECS/iptvtunerr.spec --define "_topdir $HOME/rpmbuild"

      - name: Ensure COPR project exists
        run: |
          set -euo pipefail
          chroots=(
            fedora-43-x86_64
            fedora-rawhide-x86_64
          )
          if copr-cli get iptvtunerr >/dev/null 2>&1; then
            copr_args=()
            for chroot in "${chroots[@]}"; do
              copr_args+=(--chroot "$chroot")
            done
            copr-cli modify iptvtunerr \
              "${copr_args[@]}" \
              --description "IPTV Tunerr RPM builds" \
              --instructions "dnf copr enable slskdn/iptvtunerr && dnf install iptvtunerr"
            exit 0
          fi
          copr_args=()
          for chroot in "${chroots[@]}"; do
            copr_args+=(--chroot "$chroot")
          done
          copr-cli create iptvtunerr \
            "${copr_args[@]}" \
            --description "IPTV Tunerr RPM builds" \
            --instructions "dnf copr enable slskdn/iptvtunerr && dnf install iptvtunerr"

      - name: Upload to COPR
        run: |
          set -euo pipefail
          srpm="$(find ~/rpmbuild/SRPMS -name '*.src.rpm' -print -quit)"
          copr-cli build \
            --chroot fedora-43-x86_64 \
            --chroot fedora-rawhide-x86_64 \
            --nowait \
            iptvtunerr "$srpm"
