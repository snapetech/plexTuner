name: Docker

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: [self-hosted, Linux, X64, iptvtunerr-deploy]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Require release tag on main
        if: ${{ github.ref_type == 'tag' }}
        run: ./scripts/ensure-release-tag-on-main.sh "${GITHUB_REF_NAME}"
      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ vars.DOCKERHUB_USERNAME != '' && format('{0}/iptvtunerr', vars.DOCKERHUB_USERNAME) || '' }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=ref,event=tag
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: ${{ github.ref_type == 'tag' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.value }}
