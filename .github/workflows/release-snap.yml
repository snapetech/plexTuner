name: Publish Snap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.63"
        required: true

permissions:
  contents: read

jobs:
  publish-snap:
    runs-on: [self-hosted, Linux, X64, iptvtunerr]
    steps:
      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.tag }}
          fetch-depth: 0

      - name: Require release tag on main
        env:
          RELEASE_TAG_MAIN_MODE: ancestor
        run: ./scripts/ensure-release-tag-on-main.sh "${{ steps.version.outputs.tag }}"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build snap source asset
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          asset="iptv-tunerr-v${version}-linux-amd64"
          rm -rf snap-src "packaging/snap/${asset}.tar.gz"
          mkdir -p snap-src
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -mod=vendor -trimpath -ldflags="-s -w -X main.Version=v${version}" -o snap-src/iptv-tunerr ./cmd/iptv-tunerr
          tar -czf "packaging/snap/${asset}.tar.gz" -C snap-src iptv-tunerr
          sha="$(sha256sum "packaging/snap/${asset}.tar.gz" | awk '{print $1}')"
          sed -i "s/^version: .*/version: '${version}'/" packaging/snap/snapcraft.yaml
          sed -i "s#^    command: .*#    command: iptv-tunerr#" packaging/snap/snapcraft.yaml
          sed -i "s#^    source: .*#    source: ${asset}.tar.gz#" packaging/snap/snapcraft.yaml
          sed -i "s#^    source-checksum: .*#    source-checksum: sha256/${sha}#" packaging/snap/snapcraft.yaml

      - name: Install Snapcraft
        run: |
          set -euo pipefail
          sudo snap install snapcraft --classic || true
          sudo ln -sf /var/lib/snapd/snap/bin/snapcraft /usr/local/bin/snapcraft
          echo /var/lib/snapd/snap/bin >> "$GITHUB_PATH"

      - name: Build snap
        id: build
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          asset="iptv-tunerr-v${version}-linux-amd64"
          rm -rf snap-prime
          mkdir -p snap-prime/meta
          tar -xzf "packaging/snap/${asset}.tar.gz" -C snap-prime
          chmod 0755 snap-prime/iptv-tunerr
          cat > snap-prime/meta/snap.yaml <<EOF
          name: iptvtunerr
          base: core24
          version: '${version}'
          summary: IPTV to Plex, Emby, and Jellyfin bridge
          description: |
            IPTV Tunerr turns IPTV sources into a stable HDHomeRun-style tuner and XMLTV
            guide surface for Plex, Emby, and Jellyfin.
          grade: stable
          confinement: strict
          architectures:
            - amd64
          apps:
            iptvtunerr:
              command: iptv-tunerr
              plugs: [network, network-bind, home, removable-media]
          EOF
          snap pack snap-prime packaging/snap --filename "iptvtunerr_${version}_amd64.snap"
          snap="$(find "$PWD/packaging/snap" -maxdepth 1 -name '*.snap' -print -quit)"
          test -n "$snap"
          echo "snap=$snap" >> "$GITHUB_OUTPUT"

      - uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable
