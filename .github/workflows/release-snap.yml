name: Publish Snap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.63"
        required: true

permissions:
  contents: read

jobs:
  publish-snap:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.tag }}
          fetch-depth: 0

      - name: Require release tag on main
        run: ./scripts/ensure-release-tag-on-main.sh "${{ steps.version.outputs.tag }}"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build snap source asset
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          asset="iptv-tunerr-v${version}-linux-amd64"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -mod=vendor -trimpath -ldflags="-s -w -X main.Version=v${version}" -o "$asset" ./cmd/iptv-tunerr
          tar -czf "${asset}.tar.gz" "$asset"
          sha="$(sha256sum "${asset}.tar.gz" | awk '{print $1}')"
          sed -i "s/^version: .*/version: '${version}'/" packaging/snap/snapcraft.yaml
          sed -i "s#^    command: .*#    command: ${asset}#" packaging/snap/snapcraft.yaml
          sed -i "s#^    source: .*#    source: ${GITHUB_WORKSPACE}/${asset}.tar.gz#" packaging/snap/snapcraft.yaml
          sed -i "s#^    source-checksum: .*#    source-checksum: sha256/${sha}#" packaging/snap/snapcraft.yaml

      - uses: snapcore/action-build@v1
        id: build
        with:
          path: packaging/snap

      - uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable
