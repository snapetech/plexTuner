workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

stages:
  - build
  - scan
  - promote

variables:
  DOCKER_BUILDKIT: "1"
  IMAGE_TAG: "$CI_REGISTRY_IMAGE:${CI_COMMIT_REF_SLUG}"
  IMAGE_SHA_TAG: "$CI_REGISTRY_IMAGE:${CI_COMMIT_SHORT_SHA}"

docker:iptv-tunerr:
  stage: build
  image: docker:27.5.1
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker buildx use default
  script:
    - >
      docker buildx build --network host
      --file Dockerfile
      --build-arg VERSION="${CI_COMMIT_TAG:-dev-$CI_COMMIT_SHORT_SHA}"
      --platform linux/amd64,linux/arm64,linux/arm/v7
      --tag "$IMAGE_TAG"
      --tag "$IMAGE_SHA_TAG"
      --push
      .
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker buildx imagetools create --tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG" "$IMAGE_SHA_TAG"
        docker buildx imagetools create --tag "$CI_REGISTRY_IMAGE:latest" "$IMAGE_SHA_TAG"
      fi

.trivy_scan:
  stage: scan
  image:
    name: aquasec/trivy:0.58.2
    entrypoint: [""]
  script:
    - trivy image --username "$CI_REGISTRY_USER" --password "$CI_REGISTRY_PASSWORD" --exit-code 0 --severity HIGH,CRITICAL "$CS_IMAGE"

container_scanning:
  extends: .trivy_scan
  needs: ["docker:iptv-tunerr"]
  variables:
    CS_IMAGE: "$IMAGE_SHA_TAG"
  rules:
    - if: '$CI_COMMIT_BRANCH || $CI_COMMIT_TAG'

.github_publication_defaults:
  variables:
    GITHUB_MIRROR_URL: "git@github.com:snapetech/iptvtunerr.git"
    GITHUB_REPOSITORY: "snapetech/iptvtunerr"

# External publication is intentionally gated on all earlier GitLab stages.
# Set GITHUB_MIRROR_SSH_KEY, GITHUB_TOKEN, and GHCR_TOKEN in GitLab CI as needed.
github:mirror:
  extends: .github_publication_defaults
  stage: promote
  image: alpine:3.21
  before_script:
    - apk add --no-cache git openssh-client
    - eval "$(ssh-agent -s)"
    - printf '%s\n' "$GITHUB_MIRROR_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
  script:
    - test -n "$GITHUB_MIRROR_URL"
    - git remote add github-mirror "$GITHUB_MIRROR_URL"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        git push github-mirror "refs/tags/$CI_COMMIT_TAG:refs/tags/$CI_COMMIT_TAG"
      else
        git push github-mirror "HEAD:$CI_COMMIT_REF_NAME"
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_TAG'

github:release:
  extends: .github_publication_defaults
  stage: promote
  image:
    name: ghcr.io/cli/cli:2.63.2
    entrypoint: [""]
  needs: ["github:mirror"]
  script:
    - test -n "$GITHUB_TOKEN"
    - test -n "$GITHUB_REPOSITORY"
    - gh release create "$CI_COMMIT_TAG" --repo "$GITHUB_REPOSITORY" --title "$CI_COMMIT_TAG" --notes "Released from GitLab pipeline $CI_PIPELINE_URL" --verify-tag
  rules:
    - if: '$CI_COMMIT_TAG'

ghcr:promote:
  extends: .github_publication_defaults
  stage: promote
  image:
    name: quay.io/skopeo/stable:v1.17.0
    entrypoint: [""]
  script:
    - test -n "$GHCR_TOKEN"
    - test -n "$GITHUB_REPOSITORY"
    - export GHCR_USER="${GHCR_USER:-${GITHUB_REPOSITORY%%/*}}"
    - export GHCR_REPOSITORY="${GHCR_REPOSITORY:-ghcr.io/$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')}"
    - skopeo login -u "$GHCR_USER" -p "$GHCR_TOKEN" ghcr.io
    - skopeo login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - skopeo copy "docker://${IMAGE_SHA_TAG}" "docker://$GHCR_REPOSITORY:$CI_COMMIT_SHORT_SHA"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        skopeo copy "docker://${IMAGE_SHA_TAG}" "docker://$GHCR_REPOSITORY:$CI_COMMIT_TAG"
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_TAG'
